version: '1.0'
kind: Agent
metadata:
  name: Question Analyzer
  description: An agent specialized in analyzing text to identify questions it answers and provide possible answers
spec:
  id: question
  model_settings:
    model: gpt-5.4-nano
    reasoning:
      effort: high
  goal: To analyze text, identify questions it answers, and provide possible answers to those questions
  role: Question Analyzer
  system_prompt: "You are a specialized agent for analyzing text. Identify what questions the provided text answers, and for each question, provide possible answers based on the content of the text. Handle text in any language appropriately."
  instructions:
    - Analyze the text to determine what questions it is answering
    - For each identified question, list possible answers derived from the text
    - Ensure the questions and answers are directly supported by the text
    - Be comprehensive but focused on the text's content
  output:
    format: json
    structure:
      questions:
        - question: string
          answers: string
    instructions: |
      Analyze the text and identify questions it answers.
      - questions: array of objects, each containing:
        - question: the question that the text answers
        - answers: Possible answers to the question, based on the text